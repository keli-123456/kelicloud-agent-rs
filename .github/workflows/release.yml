name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: kelicloud-agent-rs
  CC_x86_64_unknown_linux_musl: musl-gcc

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            asset: kelicloud-agent-rs-linux-amd64
          - target: aarch64-unknown-linux-musl
            asset: kelicloud-agent-rs-linux-arm64
          - target: armv7-unknown-linux-musleabihf
            asset: kelicloud-agent-rs-linux-armv7

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Install amd64 musl toolchain
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends musl-tools

      - name: Install cross
        run: |
          for attempt in 1 2 3; do
            if cargo install cross --locked; then
              exit 0
            fi
            if [ "$attempt" = "3" ]; then
              exit 1
            fi
            sleep $((attempt * 10))
          done

      - name: Build release binary
        run: cross build --locked --release --target ${{ matrix.target }}

      - name: Stage binary
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" "dist/${{ matrix.asset }}"
          chmod 0755 "dist/${{ matrix.asset }}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find dist -type f -name 'kelicloud-agent-rs-linux-*' -exec cp {} release-assets/ \;
          (cd release-assets && sha256sum * > SHA256SUMS && sha256sum -c SHA256SUMS)
          ls -l release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/kelicloud-agent-rs-linux-*
            release-assets/SHA256SUMS
          generate_release_notes: true
