name: KTP Microbench Matrix

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/ktp-microbench-matrix.yml
      - src/ktp.rs
      - src/ktp_transport.rs
      - src/bin/ktp-codec-bench.rs
      - src/bin/ktp-tunnel-bench.rs
      - src/bin/ktp-e2e-bench.rs
      - src/bin/ktp-policy-summary.rs
      - src/bin/ktp-carrier-matrix-summary.rs
      - src/tunnel_async_runtime.rs
      - scripts/ktp-codec-matrix.sh
      - scripts/ktp-carrier-matrix.sh
      - scripts/ktp-relay-batch-matrix.sh
      - tests/ktp_codec_bench_cli.rs
      - tests/ktp_codec_matrix_script.rs
      - tests/ktp_bench_cli.rs
      - tests/ktp_e2e_bench_cli.rs
      - tests/ktp_batch_matrix_script.rs
      - tests/ktp_policy_summary_cli.rs
      - tests/ktp_carrier_matrix_script.rs
      - tests/ktp_carrier_matrix_summary_cli.rs
  workflow_dispatch:
    inputs:
      codec_frames:
        description: Space-separated codec frame counts to run.
        required: true
        default: "512 4096"
      carrier_frames:
        description: Space-separated carrier frame counts to run.
        required: true
        default: "512 4096"
      runtime_clients:
        description: Space-separated runtime relay client counts to run.
        required: true
        default: "4 8"
      runtime_batches:
        description: Space-separated runtime relay batch sizes to run.
        required: true
        default: "64"
      runtime_batch_policies:
        description: Space-separated runtime relay batch policies to compare.
        required: true
        default: "fixed adaptive"
      runtime_frames:
        description: Frames per runtime relay benchmark client.
        required: true
        default: "64"
      runtime_payload_bytes:
        description: Payload byte size for runtime relay benchmark rows.
        required: true
        default: "8192"
      runtime_fail_on_fixed_better:
        description: Set to 1 to fail if adaptive is clearly worse than fixed.
        required: true
        default: "1"
      payload_bytes:
        description: Space-separated payload byte sizes for both matrices.
        required: true
        default: "1024 4096 16384"
      runs:
        description: Repeated runs per matrix row.
        required: true
        default: "3"

permissions:
  contents: read

concurrency:
  group: ktp-microbench-matrix-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  KTP_CODEC_MATRIX_RUNS: ${{ github.event_name == 'workflow_dispatch' && inputs.runs || '1' }}
  KTP_CODEC_MATRIX_FRAMES: ${{ github.event_name == 'workflow_dispatch' && inputs.codec_frames || '256' }}
  KTP_CODEC_MATRIX_PAYLOAD_BYTES: ${{ github.event_name == 'workflow_dispatch' && inputs.payload_bytes || '1024' }}
  KTP_CODEC_MATRIX_CHUNK_FRAMES: "64"
  KTP_CODEC_MATRIX_CSV: microbench-logs/ktp-codec-matrix.csv
  KTP_CARRIER_MATRIX_RUNS: ${{ github.event_name == 'workflow_dispatch' && inputs.runs || '1' }}
  KTP_CARRIER_MATRIX_FRAMES: ${{ github.event_name == 'workflow_dispatch' && inputs.carrier_frames || '256' }}
  KTP_CARRIER_MATRIX_PAYLOAD_BYTES: ${{ github.event_name == 'workflow_dispatch' && inputs.payload_bytes || '1024' }}
  KTP_CARRIER_MATRIX_CSV: microbench-logs/ktp-carrier-matrix.csv
  KTP_BATCH_MATRIX_RUNS: ${{ github.event_name == 'workflow_dispatch' && inputs.runs || '1' }}
  KTP_BATCH_MATRIX_CLIENTS: ${{ github.event_name == 'workflow_dispatch' && inputs.runtime_clients || '4' }}
  KTP_BATCH_MATRIX_BATCHES: ${{ github.event_name == 'workflow_dispatch' && inputs.runtime_batches || '64' }}
  KTP_BATCH_MATRIX_BATCH_POLICIES: ${{ github.event_name == 'workflow_dispatch' && inputs.runtime_batch_policies || 'fixed adaptive' }}
  KTP_BATCH_MATRIX_FRAMES: ${{ github.event_name == 'workflow_dispatch' && inputs.runtime_frames || '16' }}
  KTP_BATCH_MATRIX_PAYLOAD_BYTES: ${{ github.event_name == 'workflow_dispatch' && inputs.runtime_payload_bytes || '1024' }}
  KTP_BATCH_MATRIX_CSV: microbench-logs/ktp-relay-batch-matrix.csv
  KTP_BATCH_MATRIX_FAIL_ON_FIXED_BETTER: ${{ github.event_name == 'workflow_dispatch' && inputs.runtime_fail_on_fixed_better || '1' }}

jobs:
  linux:
    name: Linux KTP Microbench Matrix
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Build microbench binaries
        run: cargo build --locked --release --bin ktp-codec-bench --bin ktp-tunnel-bench --bin ktp-e2e-bench --bin ktp-policy-summary --bin ktp-carrier-matrix-summary

      - name: Prepare log directory
        run: mkdir -p microbench-logs

      - name: Run KTP codec matrix
        run: bash scripts/ktp-codec-matrix.sh

      - name: Run KTP carrier matrix
        run: bash scripts/ktp-carrier-matrix.sh

      - name: Run KTP runtime relay batch policy matrix
        run: |
          set -o pipefail
          bash scripts/ktp-relay-batch-matrix.sh | tee microbench-logs/ktp-relay-batch-matrix.report.txt

      - name: Gate KTP carrier matrix
        run: |
          ./target/release/ktp-carrier-matrix-summary \
            --require-ktp-aead \
            --require-batch-reuse \
            --require-positive-throughput \
            microbench-logs/ktp-carrier-matrix.csv | tee microbench-logs/ktp-carrier-matrix.report.txt

      - name: Publish KTP microbench matrix summary
        if: always()
        run: |
          {
            echo "## KTP microbench matrix summary"
            echo
            if [[ -f "microbench-logs/ktp-carrier-matrix.report.txt" ]]; then
              echo "### ktp-carrier-matrix.report.txt"
              echo
              echo '```text'
              cat "microbench-logs/ktp-carrier-matrix.report.txt"
              echo '```'
              echo
            fi
            if [[ -f "microbench-logs/ktp-relay-batch-matrix.report.txt" ]]; then
              echo "### ktp-relay-batch-matrix.report.txt"
              echo
              echo '```text'
              cat "microbench-logs/ktp-relay-batch-matrix.report.txt"
              echo '```'
              echo
            fi
            for csv in ktp-codec-matrix.csv ktp-carrier-matrix.csv ktp-relay-batch-matrix.csv; do
              path="microbench-logs/${csv}"
              echo "### ${csv}"
              echo
              if [[ -f "${path}" ]]; then
                echo '```csv'
                cat "${path}"
                echo '```'
              else
                echo "${csv} was not generated."
              fi
              echo
            done
          } >>"${GITHUB_STEP_SUMMARY}"

      - name: Upload KTP microbench matrix logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kelicloud-agent-rs-ktp-microbench-matrix
          path: microbench-logs/**/*
          if-no-files-found: ignore
