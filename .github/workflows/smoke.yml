name: Smoke

on:
  workflow_dispatch:
    inputs:
      endpoint:
        description: "kelicloud backend endpoint. Falls back to KELICLOUD_SMOKE_ENDPOINT secret when empty."
        required: false
        type: string
      mode:
        description: "Smoke mode to run."
        required: true
        default: live
        type: choice
        options:
          - once
          - live
      duration:
        description: "Live-mode duration in seconds."
        required: true
        default: "120"
        type: string
      expect_success_log:
        description: "Optional log text that must appear in the smoke log."
        required: false
        type: string
      custom_dns:
        description: "Optional custom DNS server passed to the agent."
        required: false
        type: string
      insecure:
        description: "Pass --insecure to the agent."
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  live:
    name: Live Backend Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      AGENT_ENDPOINT: ${{ inputs.endpoint != '' && inputs.endpoint || secrets.KELICLOUD_SMOKE_ENDPOINT }}
      AGENT_TOKEN: ${{ secrets.KELICLOUD_SMOKE_TOKEN }}
      AGENT_AUTO_DISCOVERY_KEY: ${{ secrets.KELICLOUD_SMOKE_AUTO_DISCOVERY_KEY }}
      AGENT_CF_ACCESS_CLIENT_ID: ${{ secrets.KELICLOUD_SMOKE_CF_ACCESS_CLIENT_ID }}
      AGENT_CF_ACCESS_CLIENT_SECRET: ${{ secrets.KELICLOUD_SMOKE_CF_ACCESS_CLIENT_SECRET }}
      SMOKE_MODE: ${{ inputs.mode }}
      SMOKE_DURATION: ${{ inputs.duration }}
      SMOKE_EXPECT_SUCCESS_LOG: ${{ inputs.expect_success_log }}
      SMOKE_CUSTOM_DNS: ${{ inputs.custom_dns }}
      SMOKE_INSECURE: ${{ inputs.insecure }}
      TMPDIR: smoke-logs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Validate smoke configuration
        run: |
          mkdir -p "${TMPDIR}"
          if [ -z "${AGENT_ENDPOINT}" ]; then
            echo "AGENT_ENDPOINT is required. Set the endpoint input or KELICLOUD_SMOKE_ENDPOINT secret."
            exit 1
          fi
          if [ -z "${AGENT_TOKEN}" ] && [ -z "${AGENT_AUTO_DISCOVERY_KEY}" ]; then
            echo "AGENT_TOKEN or AGENT_AUTO_DISCOVERY_KEY is required. Set KELICLOUD_SMOKE_TOKEN or KELICLOUD_SMOKE_AUTO_DISCOVERY_KEY."
            exit 1
          fi
          if [ -n "${AGENT_TOKEN}" ]; then
            echo "::add-mask::$AGENT_TOKEN"
          fi
          if [ -n "${AGENT_AUTO_DISCOVERY_KEY}" ]; then
            echo "::add-mask::$AGENT_AUTO_DISCOVERY_KEY"
          fi
          if [ -n "${AGENT_CF_ACCESS_CLIENT_SECRET}" ]; then
            echo "::add-mask::$AGENT_CF_ACCESS_CLIENT_SECRET"
          fi

      - name: Run live smoke
        run: |
          args=(
            --mode "${SMOKE_MODE}"
            --duration "${SMOKE_DURATION}"
          )
          if [ -n "${SMOKE_EXPECT_SUCCESS_LOG}" ]; then
            args+=(--expect-success-log "${SMOKE_EXPECT_SUCCESS_LOG}")
          fi
          if [ -n "${SMOKE_CUSTOM_DNS}" ]; then
            args+=(--custom-dns "${SMOKE_CUSTOM_DNS}")
          fi
          if [ "${SMOKE_INSECURE}" = "true" ]; then
            args+=(--insecure)
          fi
          scripts/smoke-live.sh "${args[@]}"

      - name: Upload smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kelicloud-agent-rs-smoke-logs
          path: smoke-logs/*
          if-no-files-found: ignore
