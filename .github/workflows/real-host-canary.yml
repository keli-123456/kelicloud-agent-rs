name: Real Host Canary

on:
  workflow_dispatch:
    inputs:
      runner_labels:
        description: 'JSON array for the self-hosted Linux canary runner labels.'
        required: true
        default: '["self-hosted","Linux","kelicloud-canary"]'
        type: string
      endpoint:
        description: "kelicloud panel endpoint. Falls back to KELICLOUD_CANARY_ENDPOINT secret when empty."
        required: false
        type: string
      install_version:
        description: "Rust agent release tag to pin or upgrade, for example v0.2.3. Empty means latest."
        required: false
        default: ""
        type: string
      tunnel_ktp_tcp_address:
        description: "Optional KTP TCP relay address, host:port. Enables tunnel data when set."
        required: false
        type: string
      tunnel_ktp_tcp_auth_version:
        description: "Optional KTP TCP auth version for tunnel-data canaries: v1 or v2."
        required: false
        type: string
      tunnel_ktp_relay_batch_policy:
        description: "Optional KTP relay batch policy for tunnel-data canaries: fixed or adaptive."
        required: false
        type: string
      duration:
        description: "Observation window in seconds for panel exec/ping/WebSSH checks."
        required: true
        default: "180"
        type: string
      control_plane:
        description: "Run the full real-host control-plane canary wrapper with live panel exec/ping."
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      ping_target:
        description: "TCP ping target for control_plane=true."
        required: false
        default: "1.1.1.1:443"
        type: string
      service_wait:
        description: "Seconds to wait for Rust or rollback services to become active."
        required: true
        default: "60"
        type: string
      github_proxy:
        description: "Optional GitHub download proxy passed to the installer."
        required: false
        type: string
      insecure:
        description: "Pass --ignore-unsafe-cert to the Rust installer."
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      keep_installed:
        description: "Leave the Rust agent installed after canary observation."
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      require_rollback:
        description: "Fail unless KELICLOUD_CANARY_ROLLBACK_COMMAND is set and rollback is verified."
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      rollback_service_name:
        description: "Go-agent service expected after rollback."
        required: false
        default: "kelicloud-agent"
        type: string
      old_service_name:
        description: "Existing Go agent service restored by control_plane=true."
        required: false
        default: "komari-agent"
        type: string
      derive_auto_discovery_from_old_service:
        description: "When the auto-discovery secret is empty, parse endpoint/key from the old Go agent service."
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      skip_rollback_service_check:
        description: "Run rollback command without checking rollback service status."
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

concurrency:
  group: real-host-canary-${{ github.ref }}
  cancel-in-progress: false

jobs:
  canary:
    name: Real Linux Host Canary
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    timeout-minutes: 30
    env:
      CANARY_ENDPOINT: ${{ inputs.endpoint != '' && inputs.endpoint || secrets.KELICLOUD_CANARY_ENDPOINT }}
      CANARY_AUTO_DISCOVERY_KEY: ${{ secrets.KELICLOUD_CANARY_AUTO_DISCOVERY_KEY }}
      CANARY_ROLLBACK_COMMAND: ${{ secrets.KELICLOUD_CANARY_ROLLBACK_COMMAND }}
      CANARY_INSTALL_VERSION: ${{ inputs.install_version }}
      CANARY_TUNNEL_KTP_TCP_ADDRESS: ${{ inputs.tunnel_ktp_tcp_address }}
      CANARY_TUNNEL_KTP_TCP_AUTH_VERSION: ${{ inputs.tunnel_ktp_tcp_auth_version }}
      CANARY_TUNNEL_KTP_RELAY_BATCH_POLICY: ${{ inputs.tunnel_ktp_relay_batch_policy }}
      CANARY_DURATION: ${{ inputs.duration }}
      CANARY_SERVICE_WAIT: ${{ inputs.service_wait }}
      CANARY_GITHUB_PROXY: ${{ inputs.github_proxy }}
      CANARY_INSECURE: ${{ inputs.insecure }}
      CANARY_KEEP_INSTALLED: ${{ inputs.keep_installed }}
      CANARY_CONTROL_PLANE: ${{ inputs.control_plane }}
      CANARY_PANEL_PING_TARGET: ${{ inputs.ping_target != '' && inputs.ping_target || secrets.KELICLOUD_PANEL_PING_TARGET }}
      CANARY_PANEL_COOKIE: ${{ secrets.KELICLOUD_PANEL_COOKIE }}
      CANARY_PANEL_USERNAME: ${{ secrets.KELICLOUD_PANEL_USERNAME }}
      CANARY_PANEL_PASSWORD: ${{ secrets.KELICLOUD_PANEL_PASSWORD }}
      CANARY_REQUIRE_ROLLBACK: ${{ inputs.require_rollback }}
      CANARY_ROLLBACK_SERVICE_NAME: ${{ inputs.rollback_service_name }}
      CANARY_OLD_SERVICE_NAME: ${{ inputs.old_service_name }}
      CANARY_DERIVE_AUTO_DISCOVERY_FROM_OLD_SERVICE: ${{ inputs.derive_auto_discovery_from_old_service }}
      CANARY_SKIP_ROLLBACK_SERVICE_CHECK: ${{ inputs.skip_rollback_service_check }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive auto-discovery from old service
        if: ${{ inputs.derive_auto_discovery_from_old_service == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${CANARY_AUTO_DISCOVERY_KEY}" ]; then
            echo "::add-mask::${CANARY_AUTO_DISCOVERY_KEY}"
            exit 0
          fi
          if [ -z "${CANARY_OLD_SERVICE_NAME}" ]; then
            echo "old_service_name is required when derive_auto_discovery_from_old_service=true."
            exit 1
          fi

          service_text="$(systemctl cat "${CANARY_OLD_SERVICE_NAME}.service" 2>/dev/null | tr '\n' ' ')"
          derived_endpoint="$(printf '%s\n' "${service_text}" | sed -n 's/.*[[:space:]]-e[[:space:]]\{1,\}\([^[:space:]]*\).*/\1/p' | tail -n 1)"
          derived_key="$(printf '%s\n' "${service_text}" | sed -n 's/.*--auto-discovery[=[:space:]]\{1,\}\([^[:space:]]*\).*/\1/p' | tail -n 1)"
          if [ -z "${derived_key}" ]; then
            echo "Could not parse --auto-discovery[=[:space:]] value from ${CANARY_OLD_SERVICE_NAME}.service."
            exit 1
          fi
          echo "::add-mask::${derived_key}"
          printf 'CANARY_AUTO_DISCOVERY_KEY=%s\n' "${derived_key}" >> "${GITHUB_ENV}"
          if [ -z "${CANARY_ENDPOINT}" ] && [ -n "${derived_endpoint}" ]; then
            printf 'CANARY_ENDPOINT=%s\n' "${derived_endpoint}" >> "${GITHUB_ENV}"
          fi

      - name: Validate canary configuration
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p canary-logs
          if [ -z "${CANARY_ENDPOINT}" ]; then
            echo "CANARY_ENDPOINT is required. Set endpoint input or KELICLOUD_CANARY_ENDPOINT secret."
            exit 1
          fi
          if [ -z "${CANARY_AUTO_DISCOVERY_KEY}" ]; then
            echo "KELICLOUD_CANARY_AUTO_DISCOVERY_KEY secret is required."
            exit 1
          fi
          if [ "${CANARY_REQUIRE_ROLLBACK}" = "true" ] && [ "${CANARY_KEEP_INSTALLED}" = "true" ]; then
            echo "require_rollback=true cannot be combined with keep_installed=true."
            exit 1
          fi
          if [ "${CANARY_REQUIRE_ROLLBACK}" = "true" ] && [ -z "${CANARY_ROLLBACK_COMMAND}" ]; then
            echo "KELICLOUD_CANARY_ROLLBACK_COMMAND secret is required when require_rollback=true."
            exit 1
          fi
          if [ "${CANARY_CONTROL_PLANE}" = "true" ] && [ -z "${CANARY_PANEL_COOKIE}" ] && { [ -z "${CANARY_PANEL_USERNAME}" ] || [ -z "${CANARY_PANEL_PASSWORD}" ]; }; then
            echo "control_plane=true requires KELICLOUD_PANEL_COOKIE or KELICLOUD_PANEL_USERNAME/KELICLOUD_PANEL_PASSWORD secrets."
            exit 1
          fi
          case "${CANARY_TUNNEL_KTP_TCP_AUTH_VERSION}" in
            ""|"v1"|"v2") ;;
            *)
              echo "--tunnel-ktp-tcp-auth-version must be v1 or v2."
              exit 1
              ;;
          esac
          case "${CANARY_TUNNEL_KTP_RELAY_BATCH_POLICY}" in
            ""|"fixed"|"adaptive") ;;
            *)
              echo "--tunnel-ktp-relay-batch-policy must be fixed or adaptive."
              exit 1
              ;;
          esac
          if [ -z "${CANARY_TUNNEL_KTP_TCP_ADDRESS}" ] && { [ -n "${CANARY_TUNNEL_KTP_TCP_AUTH_VERSION}" ] || [ -n "${CANARY_TUNNEL_KTP_RELAY_BATCH_POLICY}" ]; }; then
            echo "--tunnel-ktp-tcp-address is required when KTP auth version or relay batch policy is set."
            exit 1
          fi
          echo "::add-mask::${CANARY_AUTO_DISCOVERY_KEY}"
          if [ -n "${CANARY_ROLLBACK_COMMAND}" ]; then
            echo "::add-mask::${CANARY_ROLLBACK_COMMAND}"
          fi
          if [ -n "${CANARY_PANEL_COOKIE}" ]; then
            echo "::add-mask::${CANARY_PANEL_COOKIE}"
          fi
          if [ -n "${CANARY_PANEL_PASSWORD}" ]; then
            echo "::add-mask::${CANARY_PANEL_PASSWORD}"
          fi

      - name: Run real host canary
        if: ${{ inputs.control_plane != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          args=(
            --endpoint "${CANARY_ENDPOINT}"
            --auto-discovery "${CANARY_AUTO_DISCOVERY_KEY}"
            --duration "${CANARY_DURATION}"
            --service-wait "${CANARY_SERVICE_WAIT}"
            --evidence-file canary-logs/real-host-canary.evidence.md
          )
          if [ -n "${CANARY_INSTALL_VERSION}" ]; then
            args+=(--install-version "${CANARY_INSTALL_VERSION}")
          fi
          if [ -n "${CANARY_TUNNEL_KTP_TCP_ADDRESS}" ]; then
            args+=(--tunnel-ktp-tcp-address "${CANARY_TUNNEL_KTP_TCP_ADDRESS}")
          fi
          if [ -n "${CANARY_TUNNEL_KTP_TCP_AUTH_VERSION}" ]; then
            args+=(--tunnel-ktp-tcp-auth-version "${CANARY_TUNNEL_KTP_TCP_AUTH_VERSION}")
          fi
          if [ -n "${CANARY_TUNNEL_KTP_RELAY_BATCH_POLICY}" ]; then
            args+=(--tunnel-ktp-relay-batch-policy "${CANARY_TUNNEL_KTP_RELAY_BATCH_POLICY}")
          fi
          if [ -n "${CANARY_GITHUB_PROXY}" ]; then
            args+=(--github-proxy "${CANARY_GITHUB_PROXY}")
          fi
          if [ "${CANARY_INSECURE}" = "true" ]; then
            args+=(--insecure)
          fi
          if [ -n "${CANARY_ROLLBACK_SERVICE_NAME}" ]; then
            args+=(--rollback-service-name "${CANARY_ROLLBACK_SERVICE_NAME}")
          fi
          if [ "${CANARY_SKIP_ROLLBACK_SERVICE_CHECK}" = "true" ]; then
            args+=(--skip-rollback-service-check)
          fi
          if [ "${CANARY_KEEP_INSTALLED}" = "true" ]; then
            args+=(--keep-installed)
          elif [ -n "${CANARY_ROLLBACK_COMMAND}" ]; then
            args+=(--rollback-command "${CANARY_ROLLBACK_COMMAND}")
          fi

          sudo bash scripts/canary-install.sh "${args[@]}" 2>&1 | tee canary-logs/real-host-canary.log

      - name: Run real host control canary
        if: ${{ inputs.control_plane == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          export KELICLOUD_PANEL_COOKIE="${CANARY_PANEL_COOKIE}"
          export KELICLOUD_PANEL_USERNAME="${CANARY_PANEL_USERNAME}"
          export KELICLOUD_PANEL_PASSWORD="${CANARY_PANEL_PASSWORD}"
          args=(
            --endpoint "${CANARY_ENDPOINT}"
            --auto-discovery "${CANARY_AUTO_DISCOVERY_KEY}"
            --ping-target "${CANARY_PANEL_PING_TARGET}"
            --service-wait "${CANARY_SERVICE_WAIT}"
            --workdir canary-logs
            --old-service "${CANARY_OLD_SERVICE_NAME}"
          )
          if [ -n "${CANARY_INSTALL_VERSION}" ]; then
            args+=(--install-version "${CANARY_INSTALL_VERSION}")
          fi
          if [ -n "${CANARY_TUNNEL_KTP_TCP_ADDRESS}" ]; then
            args+=(--tunnel-ktp-tcp-address "${CANARY_TUNNEL_KTP_TCP_ADDRESS}")
          fi
          if [ -n "${CANARY_TUNNEL_KTP_TCP_AUTH_VERSION}" ]; then
            args+=(--tunnel-ktp-tcp-auth-version "${CANARY_TUNNEL_KTP_TCP_AUTH_VERSION}")
          fi
          if [ -n "${CANARY_TUNNEL_KTP_RELAY_BATCH_POLICY}" ]; then
            args+=(--tunnel-ktp-relay-batch-policy "${CANARY_TUNNEL_KTP_RELAY_BATCH_POLICY}")
          fi
          if [ -n "${CANARY_ROLLBACK_COMMAND}" ]; then
            args+=(--rollback-command "${CANARY_ROLLBACK_COMMAND}")
          fi

          sudo --preserve-env=KELICLOUD_PANEL_COOKIE,KELICLOUD_PANEL_USERNAME,KELICLOUD_PANEL_PASSWORD bash scripts/real-host-control-canary.sh "${args[@]}" 2>&1 | tee canary-logs/real-host-control-canary.log
          test -s canary-logs/real-host-control-canary.evidence.md

      - name: Capture service status
        if: always()
        shell: bash
        run: |
          set +e
          {
            echo "## kelicloud-agent-rs status"
            systemctl status kelicloud-agent-rs.service --no-pager
            echo
            echo "## kelicloud-agent-rs journal"
            journalctl -u kelicloud-agent-rs -n 120 --no-pager
            echo
            echo "## rollback service status"
            if [ -n "${CANARY_ROLLBACK_SERVICE_NAME}" ]; then
              systemctl status "${CANARY_ROLLBACK_SERVICE_NAME}.service" --no-pager
              journalctl -u "${CANARY_ROLLBACK_SERVICE_NAME}" -n 120 --no-pager
            fi
            if [ -n "${CANARY_OLD_SERVICE_NAME}" ] && [ "${CANARY_OLD_SERVICE_NAME}" != "${CANARY_ROLLBACK_SERVICE_NAME}" ]; then
              echo
              echo "## old service status"
              systemctl status "${CANARY_OLD_SERVICE_NAME}.service" --no-pager
              journalctl -u "${CANARY_OLD_SERVICE_NAME}" -n 120 --no-pager
            fi
          } > canary-logs/service-status.log 2>&1

      - name: Upload canary logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kelicloud-agent-rs-real-host-canary
          path: canary-logs/*
          if-no-files-found: ignore
