name: Local Backend Smoke

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: local-backend-smoke-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  KOMARI_DB_HOST: 127.0.0.1
  KOMARI_DB_PORT: 3306
  KOMARI_DB_USER: root
  KOMARI_DB_PASS: rootpass
  KOMARI_DB_NAME: komari
  KELICLOUD_BACKEND_REF: main
  KOMARI_FRONTEND_REF: main

jobs:
  linux:
    name: Linux Control Plane (${{ matrix.data_plane }})
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - data_plane: websocket
            ktp_tcp: "false"
            tunnel_echo_rounds: "1"
            tunnel_echo_clients: "1"
            tunnel_echo_profile: fixed
            tunnel_echo_payload_bytes: "0"
            ktp_min_max_batch_frames: "1"
            ktp_min_max_write_batch_frames: "1"
          - data_plane: ktp_tcp
            ktp_tcp: "true"
            tunnel_echo_rounds: "8"
            tunnel_echo_clients: "4"
            tunnel_echo_profile: rdp-like
            tunnel_echo_payload_bytes: "8192"
            ktp_min_max_batch_frames: "2"
            ktp_min_max_write_batch_frames: "2"
    env:
      KELICLOUD_SMOKE_KTP_TCP: ${{ matrix.ktp_tcp }}
      KELICLOUD_TUNNEL_ECHO_ROUNDS: ${{ matrix.tunnel_echo_rounds }}
      KELICLOUD_TUNNEL_ECHO_CLIENTS: ${{ matrix.tunnel_echo_clients }}
      KELICLOUD_TUNNEL_ECHO_PROFILE: ${{ matrix.tunnel_echo_profile }}
      KELICLOUD_TUNNEL_ECHO_PAYLOAD_BYTES: ${{ matrix.tunnel_echo_payload_bytes }}
      KTP_LIVE_CANARY_MIN_MAX_BATCH_FRAMES: ${{ matrix.ktp_min_max_batch_frames }}
      KTP_LIVE_CANARY_MIN_MAX_WRITE_BATCH_FRAMES: ${{ matrix.ktp_min_max_write_batch_frames }}
      KOMARI_DB_NAME: komari_${{ matrix.data_plane }}
      SMOKE_LOG_DIR: smoke-logs-${{ matrix.data_plane }}

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: komari
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -prootpass"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rustfmt

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.11"

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install MySQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client

      - name: Run local backend smoke
        run: |
          mkdir -p "${SMOKE_LOG_DIR}"
          set +e
          bash scripts/smoke-local-backend.sh
          smoke_status=$?
          if [[ "${smoke_status}" == "0" ]]; then
            echo "pass" >"${SMOKE_LOG_DIR}/smoke.status"
          else
            echo "fail" >"${SMOKE_LOG_DIR}/smoke.status"
          fi
          exit "${smoke_status}"

      - name: Upload smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kelicloud-agent-rs-local-backend-smoke-${{ matrix.data_plane }}
          path: smoke-logs-${{ matrix.data_plane }}/*
          if-no-files-found: ignore

  carrier-summary:
    name: Local Backend Carrier Summary
    runs-on: ubuntu-latest
    needs: linux
    if: always()
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Download local backend smoke logs
        uses: actions/download-artifact@v4
        with:
          pattern: kelicloud-agent-rs-local-backend-smoke-*
          path: carrier-matrix-artifacts
          merge-multiple: false

      - name: Build carrier matrix summary
        run: |
          set -euo pipefail
          summary="carrier-matrix-summary/matrix-summary.tsv"
          report="carrier-matrix-summary/matrix-summary.report.txt"
          mkdir -p "carrier-matrix-summary"
          markdown_value() {
            local file="$1"
            local key="$2"
            if [[ -f "${file}" ]]; then
              grep -E "^- ${key}: " "${file}" | head -n 1 | sed -E "s/^- ${key}: //" || true
            fi
          }

          value_or_dash() {
            local value="${1:-}"
            if [[ -z "${value}" ]]; then
              echo "-"
            else
              echo "${value}"
            fi
          }

          printf 'carrier\tktp_tcp\tktp_crypto\tstatus\tlog_dir\tsummary_file\tktp_evidence_file\ttunnel_evidence_file\ttunnel_profile\ttunnel_clients\ttunnel_rounds\ttunnel_total_payload_bytes\trtt_micros_p50\trtt_micros_p95\trtt_micros_p99\trtt_micros_max\trtt_client_p95_spread_micros\n' >"${summary}"

          for carrier in websocket ktp_tcp; do
            artifact="carrier-matrix-artifacts/kelicloud-agent-rs-local-backend-smoke-${carrier}"
            ktp_tcp="false"
            if [[ "${carrier}" == "ktp_tcp" ]]; then
              ktp_tcp="true"
            fi

            status="fail"
            if [[ -f "${artifact}/smoke.status" ]]; then
              status="$(tr -d '[:space:]' <"${artifact}/smoke.status")"
            fi

            summary_file="-"
            if [[ -f "${artifact}/agent.summary.md" ]]; then
              summary_file="${artifact}/agent.summary.md"
            fi

            ktp_evidence_file="-"
            ktp_crypto="-"
            if [[ "${ktp_tcp}" == "true" && -f "${artifact}/ktp-live-canary.evidence.md" ]]; then
              ktp_evidence_file="${artifact}/ktp-live-canary.evidence.md"
              ktp_crypto="$(grep -Eo 'crypto=[^[:space:]`]+' "${ktp_evidence_file}" | tail -n 1 | cut -d= -f2 || true)"
              if [[ -z "${ktp_crypto}" ]]; then
                ktp_crypto="-"
              fi
            fi

            tunnel_evidence_file="-"
            tunnel_profile="-"
            tunnel_clients="-"
            tunnel_rounds="-"
            tunnel_total_payload_bytes="-"
            rtt_micros_p50="-"
            rtt_micros_p95="-"
            rtt_micros_p99="-"
            rtt_micros_max="-"
            rtt_client_p95_spread_micros="-"
            if [[ -f "${artifact}/tunnel-echo.evidence.md" ]]; then
              tunnel_evidence_file="${artifact}/tunnel-echo.evidence.md"
              tunnel_profile="$(value_or_dash "$(markdown_value "${tunnel_evidence_file}" profile)")"
              tunnel_clients="$(value_or_dash "$(markdown_value "${tunnel_evidence_file}" clients)")"
              tunnel_rounds="$(value_or_dash "$(markdown_value "${tunnel_evidence_file}" rounds)")"
              tunnel_total_payload_bytes="$(value_or_dash "$(markdown_value "${tunnel_evidence_file}" total_payload_bytes)")"
              rtt_micros_p50="$(value_or_dash "$(markdown_value "${tunnel_evidence_file}" rtt_micros_p50)")"
              rtt_micros_p95="$(value_or_dash "$(markdown_value "${tunnel_evidence_file}" rtt_micros_p95)")"
              rtt_micros_p99="$(value_or_dash "$(markdown_value "${tunnel_evidence_file}" rtt_micros_p99)")"
              rtt_micros_max="$(value_or_dash "$(markdown_value "${tunnel_evidence_file}" rtt_micros_max)")"
              rtt_client_p95_spread_micros="$(value_or_dash "$(markdown_value "${tunnel_evidence_file}" rtt_client_p95_spread_micros)")"
            fi

            printf '%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\n' \
              "${carrier}" \
              "${ktp_tcp}" \
              "${ktp_crypto}" \
              "${status}" \
              "${artifact}" \
              "${summary_file}" \
              "${ktp_evidence_file}" \
              "${tunnel_evidence_file}" \
              "${tunnel_profile}" \
              "${tunnel_clients}" \
              "${tunnel_rounds}" \
              "${tunnel_total_payload_bytes}" \
              "${rtt_micros_p50}" \
              "${rtt_micros_p95}" \
              "${rtt_micros_p99}" \
              "${rtt_micros_max}" \
              "${rtt_client_p95_spread_micros}" >>"${summary}"
          done

          set +e
          cargo run --locked --bin ktp-local-backend-matrix-summary -- \
            --require-pass \
            --require-ktp-aead \
            --require-ktp-tunnel-rtt \
            "${summary}" | tee "${report}"
          summary_status="${PIPESTATUS[0]}"
          exit "${summary_status}"

      - name: Publish carrier summary
        if: always()
        run: |
          report="carrier-matrix-summary/matrix-summary.report.txt"
          {
            echo "## Local backend carrier matrix summary"
            echo
            if [[ -f "${report}" ]]; then
              echo '```text'
              cat "${report}"
              echo '```'
            else
              echo "matrix-summary.report.txt was not generated."
            fi
          } >>"${GITHUB_STEP_SUMMARY}"

      - name: Upload carrier summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kelicloud-agent-rs-local-backend-carrier-summary
          path: carrier-matrix-summary/*
          if-no-files-found: ignore
