name: KTP Tunnel Matrix

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/ktp-tunnel-matrix.yml
      - src/ktp.rs
      - src/config.rs
      - src/ktp_transport.rs
      - src/tunnel_control.rs
      - src/tunnel_async_runtime.rs
      - src/tunnel_data.rs
      - src/tunnel_preflight.rs
      - src/tunnel_runtime.rs
      - src/bin/ktp-tunnel-matrix-summary.rs
      - tests/ktp.rs
      - tests/config.rs
      - tests/ktp_transport.rs
      - tests/tunnel_control.rs
      - tests/tunnel_async_runtime.rs
      - tests/ktp_tunnel_matrix_summary_cli.rs
      - tests/tunnel_data.rs
      - tests/tunnel_preflight.rs
      - tests/tunnel_runtime.rs
      - scripts/ktp-local-backend-tunnel-matrix.sh
  workflow_dispatch:
    inputs:
      clients:
        description: Space-separated tunnel client counts to run.
        required: true
        default: "1 2 4 8"
      relay_batch_policies:
        description: Space-separated relay batch policies to run.
        required: true
        default: "fixed adaptive"
      rounds:
        description: Echo rounds per client.
        required: true
        default: "8"
      payload_bytes:
        description: Payload size for the RDP-like tunnel echo profile.
        required: true
        default: "8192"
      min_max_batch_frames:
        description: Minimum required max frame batch size in the KTP canary.
        required: true
        default: "2"
      min_max_write_batch_frames:
        description: Minimum required socket write max frame batch size in the KTP canary.
        required: true
        default: "2"
      adaptive_high_sessions:
        description: Session count where adaptive relay batching enters the high-concurrency path.
        required: true
        default: "8"
      adaptive_elevated_dwell_us:
        description: Queue dwell p95 threshold in microseconds for the elevated adaptive cap.
        required: true
        default: "50000"
      adaptive_severe_dwell_us:
        description: Queue dwell p95 threshold in microseconds for the severe adaptive cap.
        required: true
        default: "250000"
      adaptive_elevated_cap:
        description: Adaptive relay batch cap used after elevated dwell is observed.
        required: true
        default: "16"
      adaptive_severe_cap:
        description: Adaptive relay batch cap used after severe dwell is observed.
        required: true
        default: "8"
      client_timeout_seconds:
        description: Per-client-count smoke timeout. Use 0 to disable.
        required: true
        default: "900"
      max_rtt_p95_micros:
        description: Optional maximum RTT p95 in microseconds for each passing row.
        required: false
        default: ""
      max_client_p95_spread_micros:
        description: Optional maximum per-client p95 spread in microseconds for each passing row.
        required: false
        default: ""
      min_throughput_mib_s:
        description: Optional minimum throughput in MiB/s for each passing row.
        required: false
        default: ""
      summary_require_pass:
        description: Fail the summary step when any matrix row is not pass.
        required: true
        default: "true"
      summary_fail_on_fixed_better:
        description: Fail the summary step when fixed beats adaptive for the same client count.
        required: true
        default: "false"

permissions:
  contents: read

concurrency:
  group: ktp-tunnel-matrix-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  KOMARI_DB_HOST: 127.0.0.1
  KOMARI_DB_PORT: 3306
  KOMARI_DB_USER: root
  KOMARI_DB_PASS: rootpass
  KOMARI_DB_NAME: komari_tunnel_matrix
  KELICLOUD_BACKEND_REF: main
  KOMARI_FRONTEND_REF: main
  KTP_LOCAL_BACKEND_TUNNEL_MATRIX_CLIENTS: ${{ github.event_name == 'workflow_dispatch' && inputs.clients || '1 2' }}
  KTP_LOCAL_BACKEND_TUNNEL_MATRIX_RELAY_BATCH_POLICIES: ${{ github.event_name == 'workflow_dispatch' && inputs.relay_batch_policies || 'fixed adaptive' }}
  KTP_LOCAL_BACKEND_TUNNEL_MATRIX_ROUNDS: ${{ github.event_name == 'workflow_dispatch' && inputs.rounds || '4' }}
  KTP_LOCAL_BACKEND_TUNNEL_MATRIX_PAYLOAD_BYTES: ${{ github.event_name == 'workflow_dispatch' && inputs.payload_bytes || '4096' }}
  KTP_LOCAL_BACKEND_TUNNEL_MATRIX_MIN_MAX_BATCH_FRAMES: ${{ github.event_name == 'workflow_dispatch' && inputs.min_max_batch_frames || '2' }}
  KTP_LOCAL_BACKEND_TUNNEL_MATRIX_MIN_MAX_WRITE_BATCH_FRAMES: ${{ github.event_name == 'workflow_dispatch' && inputs.min_max_write_batch_frames || '2' }}
  KTP_LOCAL_BACKEND_TUNNEL_MATRIX_ADAPTIVE_HIGH_SESSIONS: ${{ github.event_name == 'workflow_dispatch' && inputs.adaptive_high_sessions || '8' }}
  KTP_LOCAL_BACKEND_TUNNEL_MATRIX_ADAPTIVE_ELEVATED_DWELL_US: ${{ github.event_name == 'workflow_dispatch' && inputs.adaptive_elevated_dwell_us || '50000' }}
  KTP_LOCAL_BACKEND_TUNNEL_MATRIX_ADAPTIVE_SEVERE_DWELL_US: ${{ github.event_name == 'workflow_dispatch' && inputs.adaptive_severe_dwell_us || '250000' }}
  KTP_LOCAL_BACKEND_TUNNEL_MATRIX_ADAPTIVE_ELEVATED_CAP: ${{ github.event_name == 'workflow_dispatch' && inputs.adaptive_elevated_cap || '16' }}
  KTP_LOCAL_BACKEND_TUNNEL_MATRIX_ADAPTIVE_SEVERE_CAP: ${{ github.event_name == 'workflow_dispatch' && inputs.adaptive_severe_cap || '8' }}
  KTP_LOCAL_BACKEND_TUNNEL_MATRIX_CLIENT_TIMEOUT_SECONDS: ${{ github.event_name == 'workflow_dispatch' && inputs.client_timeout_seconds || '900' }}
  KTP_LOCAL_BACKEND_TUNNEL_MATRIX_MAX_RTT_P95_MICROS: ${{ github.event_name == 'workflow_dispatch' && inputs.max_rtt_p95_micros || '' }}
  KTP_LOCAL_BACKEND_TUNNEL_MATRIX_MAX_CLIENT_P95_SPREAD_MICROS: ${{ github.event_name == 'workflow_dispatch' && inputs.max_client_p95_spread_micros || '' }}
  KTP_LOCAL_BACKEND_TUNNEL_MATRIX_MIN_THROUGHPUT_MIB_S: ${{ github.event_name == 'workflow_dispatch' && inputs.min_throughput_mib_s || '' }}
  KTP_TUNNEL_MATRIX_SUMMARY_REQUIRE_PASS: ${{ github.event_name == 'workflow_dispatch' && inputs.summary_require_pass || 'true' }}
  KTP_TUNNEL_MATRIX_SUMMARY_FAIL_ON_FIXED_BETTER: ${{ github.event_name == 'workflow_dispatch' && inputs.summary_fail_on_fixed_better || 'false' }}
  KTP_LOCAL_BACKEND_TUNNEL_MATRIX_LOG_DIR: tunnel-matrix-logs
  KTP_LOCAL_BACKEND_TUNNEL_MATRIX_WORK_DIR: /tmp/kelicloud-tunnel-matrix-work

jobs:
  linux:
    name: Linux KTP Tunnel Matrix
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: komari_tunnel_matrix
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -prootpass"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rustfmt

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.11"

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install MySQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client

      - name: Run KTP tunnel matrix
        run: bash scripts/ktp-local-backend-tunnel-matrix.sh

      - name: Summarize tunnel matrix report
        if: always()
        run: |
          set -o pipefail
          summary="tunnel-matrix-logs/matrix-summary.tsv"
          report="tunnel-matrix-logs/matrix-summary.report.txt"
          if [[ -f "${summary}" ]]; then
            summary_args=()
            if [[ "${KTP_TUNNEL_MATRIX_SUMMARY_REQUIRE_PASS}" == "true" ]]; then
              summary_args+=(--require-pass)
            fi
            if [[ "${KTP_TUNNEL_MATRIX_SUMMARY_FAIL_ON_FIXED_BETTER}" == "true" ]]; then
              summary_args+=(--fail-on-fixed-better)
            fi
            if [[ -n "${KTP_LOCAL_BACKEND_TUNNEL_MATRIX_MAX_RTT_P95_MICROS}" ]]; then
              summary_args+=(--max-rtt-p95-micros "${KTP_LOCAL_BACKEND_TUNNEL_MATRIX_MAX_RTT_P95_MICROS}")
            fi
            if [[ -n "${KTP_LOCAL_BACKEND_TUNNEL_MATRIX_MAX_CLIENT_P95_SPREAD_MICROS}" ]]; then
              summary_args+=(--max-client-p95-spread-micros "${KTP_LOCAL_BACKEND_TUNNEL_MATRIX_MAX_CLIENT_P95_SPREAD_MICROS}")
            fi
            if [[ -n "${KTP_LOCAL_BACKEND_TUNNEL_MATRIX_MIN_THROUGHPUT_MIB_S}" ]]; then
              summary_args+=(--min-throughput-mib-s "${KTP_LOCAL_BACKEND_TUNNEL_MATRIX_MIN_THROUGHPUT_MIB_S}")
            fi
            summary_args+=(--expect-policies "${KTP_LOCAL_BACKEND_TUNNEL_MATRIX_RELAY_BATCH_POLICIES}")
            summary_args+=(--expect-clients "${KTP_LOCAL_BACKEND_TUNNEL_MATRIX_CLIENTS}")
            cargo run --locked --bin ktp-tunnel-matrix-summary -- "${summary_args[@]}" "${summary}" | tee "${report}"
          else
            mkdir -p "$(dirname "${report}")"
            echo "matrix-summary.tsv was not generated." | tee "${report}"
          fi

      - name: Publish tunnel matrix summary
        if: always()
        run: |
          summary="tunnel-matrix-logs/matrix-summary.tsv"
          report="tunnel-matrix-logs/matrix-summary.report.txt"
          {
            echo "## KTP tunnel matrix summary"
            echo
            if [[ -f "${report}" ]]; then
              echo '```text'
              cat "${report}"
              echo '```'
              echo
            fi
            if [[ -f "${summary}" ]]; then
              echo '```tsv'
              cat "${summary}"
              echo '```'
            else
              echo "matrix-summary.tsv was not generated."
            fi
          } >>"${GITHUB_STEP_SUMMARY}"

      - name: Upload tunnel matrix logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kelicloud-agent-rs-ktp-tunnel-matrix
          path: tunnel-matrix-logs/**/*
          if-no-files-found: ignore
